name: Build Android APK

on:
  push:
    branches: ["**"]
    paths:
      - "android/**"
      - ".github/workflows/build-apk.yml"
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v3

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 platform-tools"

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.9 --distribution-type bin

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Build Release APK (unsigned)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CodeIDE-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: CodeIDE-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

  release:
    name: Publish GitHub Release (on tag)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
